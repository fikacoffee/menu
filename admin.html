<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fika Coffee - Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#E86A33' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f4f6; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #E86A33; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Base64 encoding/decoding helper supporting UTF-8
        const utf8_to_b64 = (str) => window.btoa(unescape(encodeURIComponent(str)));
        const b64_to_utf8 = (str) => decodeURIComponent(escape(window.atob(str)));

        const App = () => {
            const [creds, setCreds] = useState(() => JSON.parse(localStorage.getItem('fika_github_creds')) || null);
            const [menuData, setMenuData] = useState(null);
            const [dataSha, setDataSha] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            
            const [activeCat, setActiveCat] = useState(null);
            const [editingItem, setEditingItem] = useState(null); // { item, index, isNew }
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                if (creds) {
                    fetchData();
                }
                lucide.createIcons();
            }, [creds]);

            useEffect(() => {
                lucide.createIcons();
            }, [menuData, activeCat, editingItem, error, loading]);

            const handleLogin = (e) => {
                e.preventDefault();
                const form = e.target;
                const newCreds = {
                    username: form.username.value.trim(),
                    repo: form.repo.value.trim(),
                    token: form.token.value.trim()
                };
                localStorage.setItem('fika_github_creds', JSON.stringify(newCreds));
                setCreds(newCreds);
            };

            const logout = () => {
                localStorage.removeItem('fika_github_creds');
                setCreds(null);
                setMenuData(null);
            };

            const getApiUrl = (path) => `https://api.github.com/repos/${creds.username}/${creds.repo}/contents/${path}`;

            const fetchWithAuth = async (url, options = {}) => {
                const res = await fetch(url, {
                    ...options,
                    headers: {
                        'Authorization': `token ${creds.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        ...options.headers
                    }
                });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            };

            const fetchData = async () => {
                setLoading(true);
                setError('');
                try {
                    const res = await fetchWithAuth(getApiUrl('data.json') + `?ref=main&t=${Date.now()}`); // Cache bust
                    const content = b64_to_utf8(res.content);
                    const parsed = JSON.parse(content);
                    setMenuData(parsed);
                    setDataSha(res.sha);
                    if (!activeCat) setActiveCat(Object.keys(parsed)[0]);
                } catch (err) {
                    console.error(err);
                    setError('Veriler çekilirken hata oluştu. Depo adı veya Token yanlış olabilir.');
                }
                setLoading(false);
            };

            const saveMenuToGithub = async (newData) => {
                setIsSaving(true);
                setError('');
                try {
                    const content = utf8_to_b64(JSON.stringify(newData, null, 2));
                    const body = {
                        message: 'Admin Panel: Menü güncellendi',
                        content: content,
                        sha: dataSha,
                        branch: 'main'
                    };
                    const res = await fetchWithAuth(getApiUrl('data.json'), {
                        method: 'PUT',
                        body: JSON.stringify(body)
                    });
                    
                    setMenuData(newData);
                    setDataSha(res.content.sha);
                    setEditingItem(null);
                } catch (err) {
                    console.error(err);
                    setError('Kaydedilirken hata oluştu. Lütfen tekrar deneyin.');
                }
                setIsSaving(false);
            };

            const uploadImage = async (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async () => {
                        try {
                            const base64Data = reader.result.split(',')[1];
                            const cleanName = file.name.replace(/[^a-zA-Z0-9.]/g, '');
                            const path = `images/${Date.now()}-${cleanName}`;
                            
                            await fetchWithAuth(getApiUrl(path), {
                                method: 'PUT',
                                body: JSON.stringify({
                                    message: `Admin Panel: Fotoğraf yüklendi ${cleanName}`,
                                    content: base64Data,
                                    branch: 'main'
                                })
                            });
                            resolve(path);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = error => reject(error);
                    reader.readAsDataURL(file);
                });
            };

            const handleDelete = async (catName, index) => {
                if (!confirm('Bu ürünü silmek istediğinize emin misiniz?')) return;
                const newData = { ...menuData };
                newData[catName].splice(index, 1);
                await saveMenuToGithub(newData);
            };

            const handleSaveItem = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                
                const form = e.target;
                const fileInput = form.imageFile;
                
                let imgPath = form.imgUrl.value;
                
                if (fileInput.files.length > 0) {
                    try {
                        imgPath = await uploadImage(fileInput.files[0]);
                    } catch (err) {
                        setError('Fotoğraf yüklenemedi: ' + err.message);
                        setIsSaving(false);
                        return;
                    }
                }

                const tags = form.tags.value.split(',').map(t => t.trim()).filter(t => t);
                
                const newItem = {
                    name: form.name.value,
                    price: form.price.value,
                    desc: form.desc.value,
                    img: imgPath,
                    tags: tags
                };

                const newData = { ...menuData };
                if (editingItem.isNew) {
                    if (!newData[activeCat]) newData[activeCat] = [];
                    newData[activeCat].push(newItem);
                } else {
                    newData[activeCat][editingItem.index] = newItem;
                }

                await saveMenuToGithub(newData);
            };

            if (!creds) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
                            <div className="text-center mb-8">
                                <h1 className="text-2xl font-bold text-gray-800">Admin Girişi</h1>
                                <p className="text-sm text-gray-500 mt-2">GitHub bilgilerinizi girerek menüyü yönetin.</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">GitHub Kullanıcı Adı</label>
                                    <input name="username" required placeholder="örn: ahmet" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Depo (Repository) Adı</label>
                                    <input name="repo" required placeholder="örn: qr-menu" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Personal Access Token (PAT)</label>
                                    <input name="token" type="password" required placeholder="ghp_..." className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                                    <p className="text-xs text-gray-500 mt-1">* Token'ın 'repo' yetkisine sahip olması gerekir.</p>
                                </div>
                                <button type="submit" className="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition-colors">
                                    Giriş Yap
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (loading) {
                return <div className="min-h-screen flex flex-col items-center justify-center">
                    <div className="w-12 h-12 border-4 border-gray-200 border-t-primary rounded-full animate-spin"></div>
                    <p className="mt-4 text-gray-600">Veriler GitHub'dan çekiliyor...</p>
                </div>;
            }

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <h1 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <i data-lucide="settings" className="w-5 h-5 text-primary"></i> 
                            Menü Yönetimi
                        </h1>
                        <button onClick={logout} className="text-sm text-red-500 font-medium hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors">Çıkış Yap</button>
                    </nav>

                    {error && (
                        <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 m-4 rounded relative">
                            {error}
                            <button onClick={() => setError('')} className="absolute top-3 right-3"><i data-lucide="x" className="w-4 h-4"></i></button>
                        </div>
                    )}

                    {menuData && (
                        <div className="max-w-5xl mx-auto mt-6 px-4 flex flex-col md:flex-row gap-6">
                            
                            {/* KATEGORİLER (SIDEBAR) */}
                            <div className="w-full md:w-64 shrink-0">
                                <div className="bg-white rounded-xl shadow-sm overflow-hidden sticky top-24">
                                    <div className="p-4 bg-gray-50 border-b font-semibold text-gray-700 flex justify-between items-center">
                                        Kategoriler
                                    </div>
                                    <div className="flex flex-row md:flex-col overflow-x-auto p-2 gap-1">
                                        {Object.keys(menuData).filter(c => c !== '_Config').map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => setActiveCat(cat)}
                                                className={`whitespace-nowrap px-4 py-3 text-left rounded-lg text-sm font-medium transition-colors ${activeCat === cat ? 'bg-primary/10 text-primary' : 'text-gray-600 hover:bg-gray-100'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                        <div className="my-2 border-t"></div>
                                        <button 
                                            onClick={() => setActiveCat('_Config')}
                                            className={`whitespace-nowrap px-4 py-3 text-left rounded-lg text-sm font-medium transition-colors flex items-center gap-2 ${activeCat === '_Config' ? 'bg-gray-800 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                        >
                                            <i data-lucide="settings" className="w-4 h-4"></i>
                                            Günün İkilisi Ayarı
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* ÜRÜN VEYA AYAR LİSTESİ */}
                            <div className="flex-1">
                                {activeCat === '_Config' ? (
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                                        <h2 className="text-2xl font-bold text-gray-800 mb-6">Günün İkilisi Ayarları</h2>
                                        <form onSubmit={async (e) => {
                                            e.preventDefault();
                                            const form = e.target;
                                            const newData = { ...menuData };
                                            if (!newData._Config) newData._Config = {};
                                            newData._Config.dailySuggestion = {
                                                drinkName: form.drinkName.value,
                                                foodName: form.foodName.value,
                                                discountPercent: parseInt(form.discount.value) || 0
                                            };
                                            await saveMenuToGithub(newData);
                                            alert("Ayarlar başarıyla kaydedildi!");
                                        }} className="space-y-4 max-w-md">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1">Günün İçeceği (Tam Adı)</label>
                                                <input name="drinkName" required defaultValue={menuData._Config?.dailySuggestion?.drinkName || ''} className="w-full px-4 py-2 border rounded-lg focus:ring-primary outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1">Günün Yiyeceği (Tam Adı)</label>
                                                <input name="foodName" required defaultValue={menuData._Config?.dailySuggestion?.foodName || ''} className="w-full px-4 py-2 border rounded-lg focus:ring-primary outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1">İndirim Yüzdesi (%)</label>
                                                <input name="discount" type="number" required defaultValue={menuData._Config?.dailySuggestion?.discountPercent || 15} className="w-full px-4 py-2 border rounded-lg focus:ring-primary outline-none" />
                                            </div>
                                            <button type="submit" disabled={isSaving} className="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition-colors mt-4">
                                                {isSaving ? 'Kaydediliyor...' : 'Ayarları Kaydet'}
                                            </button>
                                        </form>
                                    </div>
                                ) : (
                                    <>
                                        <div className="flex justify-between items-center mb-4">
                                            <h2 className="text-2xl font-bold text-gray-800">{activeCat}</h2>
                                            <button 
                                                onClick={() => setEditingItem({ isNew: true, item: { name: '', price: '', desc: '', img: '', tags: [] } })}
                                                className="bg-primary text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-orange-600 transition-colors shadow-sm"
                                            >
                                                <i data-lucide="plus" className="w-4 h-4"></i> Yeni Ürün
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {(menuData[activeCat] || []).map((item, idx) => (
                                                <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                                                    <div className="h-40 bg-gray-200 relative">
                                                        <img src={item.img.startsWith('http') ? item.img : `../${item.img}`} className="w-full h-full object-cover" onError={(e)=>{e.target.src='https://via.placeholder.com/400x300?text=Görsel+Yok'}} />
                                                        <div className="absolute top-2 right-2 bg-white/90 backdrop-blur px-2 py-1 rounded font-bold text-sm text-gray-800">{item.price}</div>
                                                    </div>
                                                    <div className="p-4 flex-1 flex flex-col">
                                                        <h3 className="font-bold text-lg text-gray-800 mb-1 line-clamp-1">{item.name}</h3>
                                                        <p className="text-xs text-gray-500 line-clamp-2 mb-3 flex-1">{item.desc}</p>
                                                        <div className="flex gap-2 justify-end mt-2 pt-3 border-t">
                                                            <button onClick={() => setEditingItem({ isNew: false, index: idx, item })} className="text-blue-500 hover:bg-blue-50 px-3 py-1.5 rounded flex items-center gap-1 text-sm font-medium">
                                                                <i data-lucide="edit-2" className="w-4 h-4"></i> Düzenle
                                                            </button>
                                                            <button onClick={() => handleDelete(activeCat, idx)} className="text-red-500 hover:bg-red-50 px-3 py-1.5 rounded flex items-center gap-1 text-sm font-medium">
                                                                <i data-lucide="trash-2" className="w-4 h-4"></i> Sil
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {(!menuData[activeCat] || menuData[activeCat].length === 0) && (
                                                <div className="col-span-full py-12 text-center text-gray-500 bg-white rounded-xl border border-dashed">
                                                    Bu kategoride hiç ürün yok.
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {/* DÜZENLEME MODALI */}
                    {editingItem && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-5 border-b flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold text-lg text-gray-800">{editingItem.isNew ? 'Yeni Ürün Ekle' : 'Ürünü Düzenle'}</h3>
                                    <button onClick={() => !isSaving && setEditingItem(null)} className="text-gray-400 hover:text-gray-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={handleSaveItem} className="p-5 overflow-y-auto space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-xs font-bold text-gray-700 mb-1">Ürün Adı</label>
                                            <input name="name" required defaultValue={editingItem.item.name} className="w-full px-3 py-2 border rounded-lg focus:ring-primary outline-none text-sm" />
                                        </div>
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-xs font-bold text-gray-700 mb-1">Fiyat (örn: 120₺)</label>
                                            <input name="price" required defaultValue={editingItem.item.price} className="w-full px-3 py-2 border rounded-lg focus:ring-primary outline-none text-sm" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">Açıklama</label>
                                        <textarea name="desc" rows="3" required defaultValue={editingItem.item.desc} className="w-full px-3 py-2 border rounded-lg focus:ring-primary outline-none text-sm resize-none"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">Etiketler (Virgülle ayırın)</label>
                                        <input name="tags" defaultValue={(editingItem.item.tags || []).join(', ')} placeholder="Sıcak, Tatlı, Vegan..." className="w-full px-3 py-2 border rounded-lg focus:ring-primary outline-none text-sm" />
                                    </div>

                                    <div className="border-t pt-4 mt-2">
                                        <label className="block text-xs font-bold text-gray-700 mb-2">Görsel (Cihazdan Yükle VEYA URL Gir)</label>
                                        
                                        <div className="space-y-3">
                                            <div className="relative border-2 border-dashed border-gray-300 rounded-lg p-4 hover:bg-gray-50 transition-colors text-center">
                                                <input type="file" name="imageFile" accept="image/jpeg, image/png, image/webp" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                <div className="flex flex-col items-center pointer-events-none">
                                                    <i data-lucide="upload-cloud" className="w-8 h-8 text-gray-400 mb-2"></i>
                                                    <span className="text-sm font-medium text-gray-600">Fotoğraf Yüklemek İçin Tıkla</span>
                                                    <span className="text-xs text-gray-400 mt-1">(Yeni fotoğraf seçerseniz alttaki URL yoksayılır)</span>
                                                </div>
                                            </div>

                                            <div className="flex items-center gap-2">
                                                <div className="flex-1 h-px bg-gray-200"></div>
                                                <span className="text-xs text-gray-400 font-medium">VEYA URL GİR</span>
                                                <div className="flex-1 h-px bg-gray-200"></div>
                                            </div>

                                            <input name="imgUrl" defaultValue={editingItem.item.img} placeholder="Mevcut URL veya Dosya Yolu" className="w-full px-3 py-2 border rounded-lg focus:ring-primary outline-none text-sm text-gray-500 bg-gray-50" />
                                        </div>
                                    </div>

                                    <div className="pt-4 flex gap-3">
                                        <button type="button" onClick={() => setEditingItem(null)} disabled={isSaving} className="flex-1 px-4 py-2 border rounded-lg text-gray-700 font-bold hover:bg-gray-50 disabled:opacity-50">İptal</button>
                                        <button type="submit" disabled={isSaving} className="flex-1 px-4 py-2 bg-primary text-white rounded-lg font-bold hover:bg-orange-600 disabled:opacity-50 flex items-center justify-center gap-2">
                                            {isSaving ? <span className="loader !w-4 !h-4 !border-white !border-t-transparent"></span> : <i data-lucide="save" className="w-4 h-4"></i>}
                                            {isSaving ? 'Kaydediliyor...' : 'Kaydet'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
